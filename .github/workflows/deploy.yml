name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Deploy files to /opt/poolex-control
        run: |
          find "$GITHUB_WORKSPACE" -maxdepth 1 -mindepth 1 ! -name '.git' \
            -exec cp -r {} /opt/poolex-control/ \;

      - name: Setup venv and install dependencies
        run: |
          if [ ! -f /opt/poolex-control/venv/bin/python ]; then
            echo "Création du virtualenv..."
            python3 -m venv /opt/poolex-control/venv
          fi
          /opt/poolex-control/venv/bin/pip install -r /opt/poolex-control/requirements.txt -q

      - name: Reload systemd and restart service
        run: |
          sudo systemctl daemon-reload
          sudo systemctl restart poolex

      - name: Verify service is running
        run: |
          sleep 5
          systemctl is-active poolex \
            || (echo "--- Logs du service ---" && journalctl -u poolex -n 30 --no-pager && exit 1)
